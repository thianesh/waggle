services:
  waggle:
    build: .
    container_name: waggle
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # OPTIONAL — leave empty for open mode (anyone can register a token).
      # To enforce, generate with: openssl rand -hex 24
      ADMIN_KEY: ${ADMIN_KEY:-}
    volumes:
      - waggle-data:/data

volumes:
  waggle-data:
