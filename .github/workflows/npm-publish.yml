# Publishes client/ to npm as waggle-cli with provenance attestation.
#
# Trigger: publish a GitHub release (tag like v0.2.0), or run manually.
#
# One-time setup (no token secrets needed): on npmjs.com open the waggle-cli
# package → Settings → Trusted Publisher → GitHub Actions, and enter:
#   repository: thianesh/waggle
#   workflow:   npm-publish.yml
# After that, this workflow authenticates via OIDC and every publish carries
# a provenance badge linking the package to this repo + commit.
#
# Remember to bump client/package.json version before releasing
# (cd client && npm version patch|minor|major).

name: npm publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5
      - run: npm publish --provenance --access public
        working-directory: client
